<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="author" content="Prasad Nelaturi" />
        <meta name="email" content="prasadnelaturi333@gmail.com" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
        <title>Hire me: Prasad Nelaturi</title>
        <link rel="icon" type="image/png" href="./images/pr1.png" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

        <style>
            .social-icons {
                position: fixed;
                top: 50%;
                left: 0;
                transform: translateY(-50%);
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 10px;
                z-index: 999;
            }
            .social-icons a {
                color: #fff;
                font-size: 22px;
                transition:
                    transform 0.3s,
                    color 0.3s;
            }
            .social-icons a:hover {
                transform: scale(1.2);
                color: #8d4aff;
            }

            /* MODAL BACKDROP */
            .modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.75);
                backdrop-filter: blur(6px);
                justify-content: center;
                align-items: center;
                z-index: 2000;
                animation: fadeIn 0.3s ease;
            }

            /* ANIMATIONS */
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes popIn {
                from {
                    transform: scale(0.85);
                    opacity: 0;
                }
                to {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* RESPONSIVE */
            @media (max-width: 600px) {
                .social-icons a {
                    font-size: 14px;
                }
                .social-icons {
                    padding-left: 3px;
                }
            }

            /* GO TOP BUTTON */
            #goTopBtn {
                display: none;
                position: fixed;
                bottom: 26px;
                left: 20px;
                z-index: 1000;
                width: 42px;
                height: 42px;
                font-size: 30px;
                color: #202020;
                background: linear-gradient(145deg, #fff, rgb(131, 80, 241));
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: 0.3s;
            }
            #goTopBtn:hover {
                transform: scale(1.1);
            }
        </style>
    </head>

    <body>
        <div id="root"></div>
        <!-- SOCIAL ICONS -->
        <div class="social-icons">
            <a href="tel:919652593606"><i class="bi bi-telephone-fill"></i></a>
            <a href="mailto:prasadnelaturi333@gmail.com" target="_blank"><i class="bi bi-envelope-fill"></i></a>
            <a href="https://wa.me/919652593606" target="_blank"><i class="bi bi-whatsapp"></i></a>
        </div>

        <!-- GO TOP BUTTON -->
        <button id="goTopBtn" onclick="scrollToTop()">↑</button>

        <script>
            /* Scroll to top */
            const goTopBtn = document.getElementById("goTopBtn");
            window.onscroll = () =>
                (goTopBtn.style.display = document.documentElement.scrollTop > 200 ? "flex" : "none");

            function scrollToTop() {
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
        </script>
    </body>
</html>
